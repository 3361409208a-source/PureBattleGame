name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build
      run: dotnet build --configuration Release -o ./output

    - name: Publish (self-contained)
      run: |
        dotnet publish --configuration Release `
          --self-contained true `
          --runtime win-x64 `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -o ./publish_temp

    - name: Create ZIP archive
      shell: powershell
      run: |
        Compress-Archive -Path ./publish_temp/* -DestinationPath ./PureBattleGame-${{ github.ref_name }}-win-x64.zip

    - name: Install Inno Setup
      run: |
        choco install innosetup -y

    - name: Build Installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: Pure Battle Hub ${{ github.ref_name }}
        files: |
          ./PureBattleGame-${{ github.ref_name }}-win-x64.zip
          ./PureBattleHub-*-Setup.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
